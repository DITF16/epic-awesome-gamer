name: Epic Awesome Gamer (Scheduled AiHubMix)

on:
  workflow_dispatch: # 手动触发
  schedule:
    # 周三、周五零时
    - cron: '0 0 * * 3,5'

jobs:
  epic-gamer:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    
    # 只有当仓库不是原作者仓库时才运行，保护原作者的资源
    if: github.repository != '10000ge10000/epic-awesome-gamer'

    steps:
      # 1. 升级到 v6：原生支持 Node.js 24，安全性更高
      - name: Checkout repository
        uses: actions/checkout@v6

      # 2. 升级到 v7：并将 Python 安装步骤合并进来
      - name: Install uv and Python
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          # 最佳实践：直接在这里指定 Python 版本，减少一个单独的 run 步骤
          python-version: "3.12"

      # 3. 安装系统依赖（保持不变，这是系统级的）
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb libxml2-dev libxslt-dev

      # 4. 同步项目依赖
      - name: Install dependencies
        run: uv sync

      # 5. 安装浏览器内核（增加 GITHUB_TOKEN 防止 403）
      - name: Install Camoufox
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: uv run camoufox fetch

      # 6. 执行核心逻辑
      - name: Run Epic Awesome Gamer
        env:
          EPIC_EMAIL: ${{ secrets.EPIC_EMAIL }}
          EPIC_PASSWORD: ${{ secrets.EPIC_PASSWORD }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_BASE_URL: ${{ secrets.GEMINI_BASE_URL }}
          GEMINI_MODEL: ${{ secrets.GEMINI_MODEL }}
          ENABLE_APSCHEDULER: false
          PYTHONPATH: app
        run: |
          echo "🚀 启动定时领取任务（已适配 Node.js 24 & uv v7）..."
          xvfb-run --auto-servernum --server-num=1 --server-args='-screen 0, 1920x1080x24' uv run app/deploy.py
